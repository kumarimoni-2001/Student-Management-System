{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="text-align: center;">🧮 Calculate Result</h2>
    
    <form method="post" style="margin-top: 30px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="student_name">👤 Student Name</label>
            <select class="form-control" id="student_name" name="student_name" required>
                <option value="">Select Student</option>
                {% for student in students %}
                <option value="{{ student.name }}">{{ student.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="subject">📚 Subject</label>
            <select class="form-control" id="subject" name="subject" required>
                <option value="">Select Subject</option>
                {% for subject in subjects %}
                <option value="{{ subject.name }}">{{ subject.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="marks">📊 Marks</label>
            <input type="number" class="form-control" id="marks" name="marks" placeholder="Enter marks (0-100)" min="0" max="100" step="0.01" required>
        </div>
        
        <div style="text-align: center; margin-top: 40px;">
            <button type="submit" class="btn btn-primary">
                <span style="margin-right: 10px;">⚡</span> Calculate
            </button>
            <button type="reset" class="btn btn-secondary" style="margin-left: 15px;">
                <span style="margin-right: 10px;">🔄</span> Clear
            </button>
        </div>
    </form>
</div>
{% endblock %}
